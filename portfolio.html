<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krish Joshi — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#03030d;
  overflow:hidden;
  font-family:'Space Mono',monospace;
  color:#c8d4ff;
  user-select:none;
}

canvas{
  display:block;
  width:100vw;height:100vh;
  cursor:grab;
}
canvas.drag{cursor:grabbing}
canvas.pointer{cursor:pointer}

/* ── LABELS ── */
#labels{position:fixed;inset:0;pointer-events:none;z-index:20}

.lbl{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  pointer-events:all;cursor:pointer;
  transition:transform .18s;
}
.lbl:hover{transform:translate(-50%,-50%) scale(1.1)}

.lbl-pill{
  font-family:'Orbitron',sans-serif;
  font-size:9.5px;font-weight:700;letter-spacing:2px;
  padding:5px 14px;border-radius:100px;
  border:1px solid;
  background:rgba(3,3,18,.85);
  backdrop-filter:blur(10px);
  white-space:nowrap;
}
.lbl-dot{
  width:6px;height:6px;border-radius:50%;
  animation:dpulse 2.2s ease-in-out infinite;
}
@keyframes dpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.5}}

/* ── SIDEBAR ── */
#sb{
  position:fixed;right:-480px;top:0;
  width:430px;max-width:88vw;height:100vh;
  background:rgba(4,4,20,.96);
  border-left:1px solid rgba(100,130,255,.12);
  backdrop-filter:blur(28px);
  z-index:100;
  transition:right .44s cubic-bezier(.25,.46,.45,.94);
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(100,130,255,.18) transparent;
}
#sb.open{right:0;box-shadow:-24px 0 80px rgba(0,0,0,.65)}

#sb-inner{padding:52px 32px 90px}

#sb-close{
  position:sticky;top:0;float:right;margin-bottom:6px;
  width:34px;height:34px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:50%;color:rgba(255,255,255,.45);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
#sb-close:hover{background:rgba(255,255,255,.14);color:#fff;transform:rotate(90deg)}

.sb-bar{height:3px;border-radius:2px;width:38px;margin-bottom:22px}
.sb-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
.sb-sub{font-size:10.5px;opacity:.38;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:30px}
.sb-body{font-size:12px;line-height:1.9;opacity:.68;white-space:pre-line;margin-bottom:26px}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:30px}
.tag{padding:4px 13px;border-radius:100px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid}

/* Project cards */
.pc{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:20px;margin-bottom:14px;
  transition:border-color .2s,transform .2s;
}
.pc:hover{border-color:rgba(255,255,255,.2);transform:translateX(3px)}
.pc-name{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;margin-bottom:9px}
.pc-desc{font-size:11.5px;opacity:.58;line-height:1.75;margin-bottom:12px}
.pc-tech{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.chip{padding:3px 9px;background:rgba(255,255,255,.06);border-radius:4px;font-size:10px;opacity:.72}
.pc-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;text-decoration:none;
  letter-spacing:.5px;opacity:.72;transition:opacity .2s,gap .2s;
}
.pc-link:hover{opacity:1;gap:10px}

/* Skills */
.sg{margin-bottom:24px}
.sg-name{font-size:9px;letter-spacing:3.5px;text-transform:uppercase;opacity:.32;margin-bottom:11px}
.sg-chips{display:flex;flex-wrap:wrap;gap:8px}
.sc{padding:7px 15px;border-radius:8px;font-size:10.5px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09)}

/* Contact */
.cl{
  display:flex;align-items:center;gap:16px;
  padding:16px 18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:11px;margin-bottom:11px;
  text-decoration:none;color:inherit;
  transition:all .2s;
}
.cl:hover{background:rgba(255,255,255,.07);transform:translateX(5px)}
.cl-icon{font-size:20px;width:28px;text-align:center}
.cl-name{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700}
.cl-url{font-size:10px;opacity:.35;margin-top:3px}

/* ── HUD ── */
#hud{position:fixed;top:24px;left:28px;z-index:50;pointer-events:none}
#hud-name{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:2.5px}
#hud-role{font-size:9px;opacity:.35;letter-spacing:3px;text-transform:uppercase;margin-top:4px}

/* District badges (bottom-left) */
#districts{
  position:fixed;bottom:28px;left:28px;
  display:flex;flex-direction:column;gap:7px;
  z-index:50;
}
.district-btn{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:8px;
  background:rgba(4,4,20,.75);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(8px);
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;color:#c8d4ff;
  transition:all .2s;
  opacity:.65;
}
.district-btn:hover{opacity:1;border-color:rgba(255,255,255,.25)}
.district-dot{width:6px;height:6px;border-radius:50%}

#hint{
  position:fixed;bottom:28px;right:28px;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  opacity:.2;z-index:50;pointer-events:none;
  text-align:right;
}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;
  background:#03030d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity .9s;
}
#ld-name{
  font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;letter-spacing:7px;
  margin-bottom:8px;
  animation:ldglow 2s ease-in-out infinite;
}
#ld-role{font-size:9px;letter-spacing:4px;opacity:.35;text-transform:uppercase;margin-bottom:28px}
#ld-bar-bg{width:150px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#ld-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#7733ff,#00ccff,#ff2288);animation:ldbar 1.8s ease-out forwards}
#ld-text{margin-top:14px;font-size:9px;letter-spacing:3px;opacity:.3;text-transform:uppercase;animation:ldtext 1.8s ease-in-out infinite}
@keyframes ldglow{0%,100%{text-shadow:0 0 20px rgba(119,51,255,.5)}50%{text-shadow:0 0 50px rgba(0,204,255,.7),0 0 100px rgba(0,204,255,.25)}}
@keyframes ldbar{from{width:0}to{width:100%}}
@keyframes ldtext{0%,100%{opacity:.3}50%{opacity:.6}}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const W = () => window.innerWidth;
const H = () => window.innerHeight;
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03030d);
scene.fog = new THREE.FogExp2(0x03030d, 0.015);

const camera = new THREE.PerspectiveCamera(52, W()/H(), 0.1, 400);

// ══════════════════════════════════════════════════════
//  CAMERA ORBIT CONTROLLER
// ══════════════════════════════════════════════════════
const O = {
  r:52, theta:-0.45, phi:1.08,
  tr:52, ttheta:-0.45, tphi:1.08,
  px:0, pz:0, tpx:0, tpz:0,
  dragging:false, lx:0, ly:0
};

canvas.addEventListener('mousedown', e => {
  O.dragging=true; O.lx=e.clientX; O.ly=e.clientY;
  canvas.classList.add('drag');
});
window.addEventListener('mouseup', () => {
  O.dragging=false;
  canvas.classList.remove('drag');
});
window.addEventListener('mousemove', e => {
  if(!O.dragging) return;
  O.ttheta -= (e.clientX-O.lx)*0.0028;
  O.tphi = clamp(O.tphi + (e.clientY-O.ly)*0.0028, 0.28, 1.38);
  O.lx=e.clientX; O.ly=e.clientY;
});
canvas.addEventListener('wheel', e => {
  O.tr = clamp(O.tr + e.deltaY*0.04, 14, 90);
  e.preventDefault();
}, {passive:false});

// Touch
let _pd=0;
canvas.addEventListener('touchstart', e => {
  if(e.touches.length===1){ O.dragging=true; O.lx=e.touches[0].clientX; O.ly=e.touches[0].clientY; }
  if(e.touches.length===2) _pd = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
}, {passive:true});
canvas.addEventListener('touchend', ()=>{ O.dragging=false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length===1 && O.dragging){
    O.ttheta -= (e.touches[0].clientX-O.lx)*0.0038;
    O.tphi = clamp(O.tphi + (e.touches[0].clientY-O.ly)*0.0038, 0.28, 1.38);
    O.lx=e.touches[0].clientX; O.ly=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    O.tr = clamp(O.tr - (d-_pd)*0.1, 14, 90);
    _pd=d;
  }
}, {passive:false});

function camUpdate(){
  const t=0.075;
  O.r     += (O.tr-O.r)*t;
  O.theta += (O.ttheta-O.theta)*t;
  O.phi   += (O.tphi-O.phi)*t;
  O.px    += (O.tpx-O.px)*t;
  O.pz    += (O.tpz-O.pz)*t;
  camera.position.set(
    O.px + O.r * Math.sin(O.phi) * Math.sin(O.theta),
    O.r  * Math.cos(O.phi),
    O.pz + O.r * Math.sin(O.phi) * Math.cos(O.theta)
  );
  camera.lookAt(O.px, 0, O.pz);
}

// ══════════════════════════════════════════════════════
//  LIGHTING
// ══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x111133, 3.5));
const sun = new THREE.DirectionalLight(0x6677cc, 0.5);
sun.position.set(15,40,15); sun.castShadow=true;
sun.shadow.mapSize.width = sun.shadow.mapSize.height = 1024;
scene.add(sun);

// ══════════════════════════════════════════════════════
//  GROUND PLANE + GRID
// ══════════════════════════════════════════════════════
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(140,140),
  new THREE.MeshLambertMaterial({color:0x050515})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Grid lines
(()=>{
  const s=90, div=22, step=s/div, pts=[];
  for(let i=0;i<=div;i++){
    const p = -s/2 + i*step;
    pts.push(-s/2,0.01,p, s/2,0.01,p);
    pts.push(p,0.01,-s/2, p,0.01,s/2);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.LineSegments(g, new THREE.LineBasicMaterial({color:0x111130, transparent:true, opacity:.6})));
})();

// ══════════════════════════════════════════════════════
//  BUILD MAIN BUILDINGS
// ══════════════════════════════════════════════════════
const buildings = []; // {group, body, cap, light, data, el}

function mkBuilding(data){
  const {w,d,h,color,accent,label,pos} = data;
  const [bx,,bz] = pos;
  const col = new THREE.Color(color);

  const grp = new THREE.Group();
  grp.position.set(bx, 0, bz);

  // ─ Platform ─
  const platGeo = new THREE.BoxGeometry(w+2, 0.28, d+2);
  const plat = new THREE.Mesh(platGeo, new THREE.MeshLambertMaterial({color:0x09091e}));
  plat.position.y = 0.14;
  grp.add(plat);
  const platEdge = new THREE.LineSegments(
    new THREE.EdgesGeometry(platGeo),
    new THREE.LineBasicMaterial({color, transparent:true, opacity:.4})
  );
  platEdge.position.y = 0.14;
  grp.add(platEdge);

  // ─ Body ─
  const bodyGeo = new THREE.BoxGeometry(w, h, d);
  const body = new THREE.Mesh(bodyGeo, new THREE.MeshLambertMaterial({
    color: col.clone().multiplyScalar(.11),
    emissive: col.clone().multiplyScalar(.035)
  }));
  body.position.y = h/2 + 0.28;
  body.castShadow = true;
  body.userData = {bdata: data};
  grp.add(body);

  const bodyEdge = new THREE.LineSegments(
    new THREE.EdgesGeometry(bodyGeo),
    new THREE.LineBasicMaterial({color, transparent:true, opacity:.7})
  );
  bodyEdge.position.y = h/2 + 0.28;
  grp.add(bodyEdge);

  // ─ Window strips (horizontal neon lines on body faces) ─
  const stripCount = Math.floor(h/2.5);
  [1,-1,0,0].forEach((xd,fi)=>{
    const zd = fi<2 ? 0 : (fi===2?1:-1);
    for(let r=1;r<=stripCount;r++){
      const sy = r*2.2;
      if(sy > h-0.5) continue;
      const sw = xd!==0 ? w*0.55 : d*0.55;
      const sg = xd!==0 ?
        new THREE.BoxGeometry(sw, 0.06, 0.04) :
        new THREE.BoxGeometry(0.04, 0.06, sw);
      const sm = new THREE.Mesh(sg, new THREE.MeshBasicMaterial({
        color, transparent:true,
        opacity: Math.random()>.3 ? 0.55 : 0.12
      }));
      const off = xd!==0 ? xd*(w/2+0.01) : zd*(d/2+0.01);
      sm.position.set(
        xd!==0 ? off : 0,
        sy + 0.28,
        zd!==0 ? off : 0
      );
      grp.add(sm);
    }
  });

  // ─ Glowing cap ─
  const capGeo = new THREE.BoxGeometry(w, 0.22, d);
  const cap = new THREE.Mesh(capGeo, new THREE.MeshBasicMaterial({
    color: col.clone().multiplyScalar(2.2),
    transparent:true, opacity:.9
  }));
  cap.position.y = h + 0.28 + 0.11;
  grp.add(cap);

  // ─ Point light at top ─
  const light = new THREE.PointLight(color, 2.2, 24);
  light.position.y = h + 5;
  grp.add(light);

  // ─ Antennae / rooftop details ─
  const antennaCount = 2 + Math.floor(Math.random()*2);
  for(let i=0;i<antennaCount;i++){
    const ah = 1.2 + Math.random()*3.2;
    const aw = 0.2 + Math.random()*0.15;
    const ant = new THREE.Mesh(
      new THREE.BoxGeometry(aw, ah, aw),
      new THREE.MeshBasicMaterial({color: col.clone().multiplyScalar(.7)})
    );
    ant.position.set(
      (Math.random()-.5)*(w-0.6),
      h+0.28+ah/2,
      (Math.random()-.5)*(d-0.6)
    );
    grp.add(ant);
    // Antenna tip
    const tip = new THREE.Mesh(
      new THREE.BoxGeometry(aw*1.6, aw*1.6, aw*1.6),
      new THREE.MeshBasicMaterial({color, transparent:true, opacity:.9})
    );
    tip.position.set(ant.position.x, ant.position.y+ah/2+aw, ant.position.z);
    grp.add(tip);
  }

  scene.add(grp);

  // ─ HTML label ─
  const el = document.createElement('div');
  el.className = 'lbl';
  el.innerHTML = `
    <div class="lbl-pill" style="color:${accent};border-color:${accent};box-shadow:0 0 12px ${accent}55">${label}</div>
    <div class="lbl-dot" style="background:${accent};box-shadow:0 0 10px ${accent}"></div>
  `;
  el.addEventListener('click', ()=>selectBuilding(data));
  document.getElementById('labels').appendChild(el);

  buildings.push({grp, body, cap, light, data, el, hovered:false});
}

BDATA.forEach(mkBuilding);

// ══════════════════════════════════════════════════════
//  ROADS (neon strips connecting buildings)
// ══════════════════════════════════════════════════════
[[0,0,-11,-9,0x00ccff],[0,0,12,-5,0xff2288],
 [0,0,-12,5,0x00ff99],[0,0,10,10,0xffaa00],[0,0,1,14,0xff6644]
].forEach(([x1,z1,x2,z2,c])=>{
  const dx=x2-x1, dz=z2-z1;
  const len=Math.sqrt(dx*dx+dz*dz);
  const road = new THREE.Mesh(
    new THREE.BoxGeometry(.3,.04,len),
    new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:.38})
  );
  road.position.set((x1+x2)/2, .02, (z1+z2)/2);
  road.rotation.y = Math.atan2(dx,dz);
  scene.add(road);
  // Glowing center line
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(.08,.05,len),
    new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:.7})
  );
  line.position.copy(road.position);
  line.position.y = .025;
  line.rotation.y = road.rotation.y;
  scene.add(line);
});

// ══════════════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════════════
const PC = 400;
const pPos = new Float32Array(PC*3), pCol = new Float32Array(PC*3);
const pal = [[.55,.27,1],[0,.8,1],[1,.13,.53],[0,1,.6],[1,.67,0],[1,.4,.27]];
for(let i=0;i<PC;i++){
  pPos[i*3]   = (Math.random()-.5)*100;
  pPos[i*3+1] = Math.random()*40;
  pPos[i*3+2] = (Math.random()-.5)*100;
  const p = pal[i%pal.length];
  pCol[i*3]=p[0]; pCol[i*3+1]=p[1]; pCol[i*3+2]=p[2];
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol,3));
const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({
  size:.09, vertexColors:true, transparent:true, opacity:.7
}));
scene.add(pts);

// ══════════════════════════════════════════════════════
//  RAYCASTING
// ══════════════════════════════════════════════════════
const ray = new THREE.Raycaster();
const mpos = new THREE.Vector2();
let mouseDownAt = {x:0,y:0};

canvas.addEventListener('mousedown', e => { mouseDownAt={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('mouseup', e => {
  if(Math.abs(e.clientX-mouseDownAt.x)<5 && Math.abs(e.clientY-mouseDownAt.y)<5){
    const hit = doRaycast(e.clientX, e.clientY);
    if(hit) selectBuilding(hit);
  }
});
canvas.addEventListener('mousemove', e => {
  if(O.dragging) return;
  const hit = doRaycast(e.clientX, e.clientY);
  buildings.forEach(b=>b.hovered=false);
  if(hit){
    const b = buildings.find(b=>b.data.id===hit.id);
    if(b) b.hovered=true;
    canvas.classList.add('pointer');
  } else {
    canvas.classList.remove('pointer');
  }
});

function doRaycast(cx,cy){
  const rect = canvas.getBoundingClientRect();
  mpos.x = ((cx-rect.left)/rect.width)*2-1;
  mpos.y = -((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mpos, camera);
  const hits = ray.intersectObjects(buildings.map(b=>b.body));
  return hits.length ? hits[0].object.userData.bdata : null;
}

// ══════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════
const sb     = document.getElementById('sb');
const sbBody = document.getElementById('sb-body');
document.getElementById('sb-close').addEventListener('click', closeSB);

function closeSB(){
  sb.classList.remove('open');
  O.tpx=0; O.tpz=0; O.tr=52;
}

function selectBuilding(data){
  O.tpx = data.pos[0]*0.3;
  O.tpz = data.pos[2]*0.3;
  O.tr  = clamp(O.tr*0.78, 22, 50);

  const {content,accent} = data;
  let h = '';

  h += `<div class="sb-bar" style="background:${accent}"></div>`;
  h += `<div class="sb-title" style="color:${accent}">${content.title}</div>`;
  h += `<div class="sb-sub">${content.subtitle}</div>`;

  if(content.body)
    h += `<div class="sb-body">${content.body}</div>`;

  if(content.tags){
    h += '<div class="tags">';
    content.tags.forEach(t => h += `<span class="tag" style="color:${accent};border-color:${accent}44">${t}</span>`);
    h += '</div>';
  }

  if(content.projects){
    content.projects.forEach(p => {
      h += `<div class="pc">`;
      h += `<div class="pc-name" style="color:${accent}">${p.name}</div>`;
      h += `<div class="pc-desc">${p.desc}</div>`;
      h += `<div class="pc-tech">${p.tech.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`;
      h += `<a class="pc-link" href="${p.link}" target="_blank" rel="noopener" style="color:${accent}">→ View on GitHub</a>`;
      h += `</div>`;
    });
  }

  if(content.skills){
    Object.entries(content.skills).forEach(([k,v]) => {
      h += `<div class="sg">`;
      h += `<div class="sg-name">${k}</div>`;
      h += `<div class="sg-chips">${v.map(s=>`<span class="sc" style="border-color:${accent}33">${s}</span>`).join('')}</div>`;
      h += `</div>`;
    });
  }

  if(content.links){
    content.links.forEach(l => {
      h += `<a class="cl" href="${l.url}" target="_blank" rel="noopener" style="border-color:${accent}33">`;
      h += `<span class="cl-icon">${l.icon}</span>`;
      h += `<div><div class="cl-name" style="color:${accent}">${l.label}</div><div class="cl-url">${l.sub}</div></div>`;
      h += `</a>`;
    });
  }

  sbBody.innerHTML = h;
  sb.classList.add('open');
}

// ══════════════════════════════════════════════════════
//  LABEL POSITIONING (3D → 2D projection)
// ══════════════════════════════════════════════════════
function updateLabels(){
  buildings.forEach(({grp,data,el}) => {
    const v = new THREE.Vector3(data.pos[0], grp.position.y + data.h + 5, data.pos[2]);
    v.project(camera);
    if(v.z > 1){ el.style.display='none'; return; }
    el.style.left = ((v.x*.5+.5)*W()) + 'px';
    el.style.top  = ((-v.y*.5+.5)*H()) + 'px';
    el.style.display = 'flex';
  });
}

// ══════════════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════════════
let tick = 0;
function animate(){
  requestAnimationFrame(animate);
  tick += 0.012;

  camUpdate();
  updateLabels();

  // Float particles upward
  for(let i=0;i<PC;i++){
    pPos[i*3+1] += 0.007;
    if(pPos[i*3+1] > 40) pPos[i*3+1] = 0;
  }
  pGeo.attributes.position.needsUpdate = true;

  // Pulse caps + lights
  buildings.forEach((b,i) => {
    const pulse = 0.65 + 0.35 * Math.sin(tick*2 + i*1.4);
    b.cap.material.opacity = pulse;
    b.light.intensity = (b.hovered ? 4.5 : 2.0) + 0.4*Math.sin(tick + i);
    // Hover: slightly lift cap
    b.cap.position.y = b.data.h + 0.28 + 0.11 + (b.hovered ? 0.15*Math.sin(tick*3) : 0);
  });

  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// ══════════════════════════════════════════════════════
//  INTRO: Buildings rise from underground
// ══════════════════════════════════════════════════════
buildings.forEach(b => { b.grp.position.y = -35; });

setTimeout(() => {
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display='none', 900);

  // Stagger the rise for each building
  buildings.forEach((b,i) => {
    setTimeout(() => {
      let s = null;
      function riseFrame(ts){
        if(!s) s=ts;
        const prog = Math.min((ts-s)/1200, 1);
        const ease = 1 - Math.pow(1-prog, 4); // ease-out quart
        b.grp.position.y = (ease-1)*35; // -35 → 0
        if(prog < 1) requestAnimationFrame(riseFrame);
        else b.grp.position.y = 0;
      }
      requestAnimationFrame(riseFrame);
    }, i * 130 + 200);
  });
}, 1900);

animate();
